<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alen Delgado</title>
</head>
<body>
    <style>
        html{
            height: 100%;
        }
        body {
            background: linear-gradient(360deg, #e59797, #e6ba96, #f0ee91);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 800px;
            width: 600px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .container img{
            width: 200px;
            height: 200px;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        h1{
            font-family: Arial, sans-serif;
            font-size: 30px;
        }

        p{
            font-family: Arial, sans-serif;
            font-size: 20px;
            margin: 10px 0;
        }

        a{
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: #333;
            text-decoration: none;
            border: 2px solid #333;
            padding: 10px 20px;
            border-radius: 25px;
        }
        a:hover {
            background-color: #333;
            color: #fff;
            transition: 0.3s ease;
        }

    </style>
    
    <div class="container">
        <img src="tie.jpg">
        <h1>Alen Delgado</h1>
        <p>Developer | Team Member | Designer</p>
        <a href="index2.html">Check out my projects here.</a>
    </div>
</body>
</html>
